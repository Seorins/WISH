server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: when-authorized
  server:
    base-path: /

security:
  jwt:
    # 운영 환경에서는 반드시 환경변수로 주입할 것 (256비트 이상 랜덤)
    secret: ${JWT_SECRET:local-dev-only-change-me-please-use-at-least-32-chars}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    issuer: ${JWT_ISSUER:comong}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
