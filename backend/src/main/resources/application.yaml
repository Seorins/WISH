server:
  port: 8080
  servlet:
    context-path: /api/v1
  tomcat:
    # multipart 한 요청 전체의 본문 크기 한도. spring.servlet.multipart.max-request-size 와 같이 잡아야
    # 톰캣 단계에서 미리 차단하지 않는다.
    max-http-form-post-size: 10485760
    max-swallow-size: 10485760

spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  servlet:
    multipart:
      # 작품 이미지 업로드용. 손 제스처 색칠 PNG 가 보통 1~5MB 라 10MB 면 충분.
      # 한도 초과 시 MaxUploadSizeExceededException → S14P31E103-220 에서 PAYLOAD_TOO_LARGE 매핑 예정.
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when-authorized
  server:
    base-path: /

security:
  jwt:
    # 운영 환경에서는 반드시 환경변수로 주입할 것 (256비트 이상 랜덤)
    secret: ${JWT_SECRET:local-dev-only-change-me-please-use-at-least-32-chars}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    issuer: ${JWT_ISSUER:comong}
  admin:
    # 부팅 시 USER → ADMIN 으로 promote 할 이메일 목록 (S14P31E103-300).
    # 회원가입 흐름은 항상 USER 이므로 ADMIN 부여는 이 목록에만 의존한다.
    # 환경변수 SECURITY_ADMIN_EMAILS 에 콤마 구분 문자열로 주입 (예: "alice@x.com,bob@y.com").
    # 미가입 이메일은 부팅 시 경고 로그 후 skip — 사전 회원가입 후 등록 + 재배포가 절차.
    emails: ${SECURITY_ADMIN_EMAILS:}

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

storage:
  local:
    # OS 파일시스템상 업로드 디렉토리. 상대경로면 JVM cwd 기준. 운영은 환경변수로 절대경로 주입.
    upload-dir: ${STORAGE_UPLOAD_DIR:./uploads}
    # 외부 노출 servlet 상대 prefix. StorageConfig 정적 핸들러와 SecurityConfig permit 이 모두 이 값을
    # 공유하므로 환경변수로 변경해도 한 곳에서 자동 동기화된다.
    public-url-prefix: ${STORAGE_PUBLIC_URL_PREFIX:/uploads}
