# GitLab CI 파이프라인
#
# 파트별로 stage 를 나누고, 각 job 은 해당 디렉토리 변경 시에만 실행된다.
# - backend/**  변경 시 backend 관련 job 실행
# - frontend/** 변경 시 frontend 관련 job 실행
#
# 현재 Tier 1: spotlessCheck + build (백엔드 테스트 미포함)
# 테스트 stage 는 백엔드 테스트 인프라 구축 이슈에서 추가 예정.

stages:
  - verify
  - build
  - package
  - deploy

default:
  tags:
    - docker

# ----------------------------------------------------------------------------
# Backend
# ----------------------------------------------------------------------------

.backend-base:
  image: gradle:9.4.1-jdk21
  before_script:
    - cd backend
    - chmod +x ./gradlew
  cache:
    key:
      files:
        - backend/build.gradle
        - backend/settings.gradle
    paths:
      - backend/.gradle/
      - .gradle/caches/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - backend/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - .gitlab-ci.yml

backend:format:
  extends: .backend-base
  stage: verify
  script:
    - ./gradlew spotlessCheck --no-daemon

backend:build:
  extends: .backend-base
  stage: build
  needs:
    - backend:format
  script:
    - ./gradlew build -x test --no-daemon
  artifacts:
    when: on_success
    expire_in: 1 week
    paths:
      - backend/build/libs/*.jar

backend:image:
  stage: package
  image:
    name: gcr.io/kaniko-project/executor:v1.23.2-debug
    entrypoint: [""]
  needs:
    - job: backend:build
      artifacts: true
  variables:
    BACKEND_IMAGE_NAME: ${DOCKER_HUB_IMAGE}
  before_script:
    - echo "DOCKER_HUB_IMAGE=${DOCKER_HUB_IMAGE:-<empty>}"
    - if [ -n "${DOCKER_HUB_USER}" ]; then echo "DOCKER_HUB_USER=set"; else echo "DOCKER_HUB_USER=<empty>"; fi
    - if [ -n "${DOCKER_HUB_TOKEN}" ]; then echo "DOCKER_HUB_TOKEN=set"; else echo "DOCKER_HUB_TOKEN=<empty>"; fi
    - test -n "${DOCKER_HUB_IMAGE}" || (echo "DOCKER_HUB_IMAGE is empty" && exit 1)
    - test -n "${DOCKER_HUB_USER}" || (echo "DOCKER_HUB_USER is empty" && exit 1)
    - test -n "${DOCKER_HUB_TOKEN}" || (echo "DOCKER_HUB_TOKEN is empty" && exit 1)
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"username\":\"${DOCKER_HUB_USER}\",\"password\":\"${DOCKER_HUB_TOKEN}\"}}}" > /kaniko/.docker/config.json
  script:
    - |
      echo "BACKEND_IMAGE_NAME=${BACKEND_IMAGE_NAME:-<empty>}"
      DESTINATIONS="--destination ${BACKEND_IMAGE_NAME}:backend-${CI_COMMIT_SHORT_SHA}"
      if [ -n "${CI_COMMIT_BRANCH}" ]; then
        DESTINATIONS="${DESTINATIONS} --destination ${BACKEND_IMAGE_NAME}:backend-${CI_COMMIT_REF_SLUG}-latest"
      fi

      /kaniko/executor \
        --context "${CI_PROJECT_DIR}/backend" \
        --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile" \
        ${DESTINATIONS}
  rules:
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      changes:
        - backend/**/*
        - .gitlab-ci.yml

backend:deploy-dev:
  stage: deploy
  image: curlimages/curl:8.12.1
  needs:
    - backend:image
  script:
    - test -n "${JENKINS_BASE_URL}" || (echo "JENKINS_BASE_URL is empty" && exit 1)
    - test -n "${JENKINS_USER}" || (echo "JENKINS_USER is empty" && exit 1)
    - test -n "${JENKINS_API_TOKEN}" || (echo "JENKINS_API_TOKEN is empty" && exit 1)
    - |
      BUILD_URL="${JENKINS_BASE_URL%/}/job/deploy-dev-backend/buildWithParameters"
      IMAGE_TAG="backend-${CI_COMMIT_REF_SLUG}-latest"

      echo "Triggering Jenkins deploy job: ${BUILD_URL}"
      echo "IMAGE_TAG=${IMAGE_TAG}"

      curl --fail --show-error --silent \
        --request POST \
        --user "${JENKINS_USER}:${JENKINS_API_TOKEN}" \
        --data-urlencode "IMAGE_TAG=${IMAGE_TAG}" \
        "${BUILD_URL}"
  rules:
    - if: $CI_COMMIT_BRANCH == "develop"
      changes:
        - backend/**/*
        - .gitlab-ci.yml

# ----------------------------------------------------------------------------
# Frontend
# ----------------------------------------------------------------------------

.frontend-base:
  image: node:24-alpine
  variables:
    PNPM_HOME: "${CI_PROJECT_DIR}/.pnpm-store"
  before_script:
    - npm install -g pnpm@10.33.0
    - cd frontend
    - pnpm install --frozen-lockfile
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - .pnpm-store/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "develop" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml

frontend:verify:
  extends: .frontend-base
  stage: verify
  script:
    - pnpm lint
    - pnpm typecheck

frontend:test:
  extends: .frontend-base
  stage: verify
  script:
    - pnpm test

frontend:build:
  extends: .frontend-base
  stage: build
  needs:
    - frontend:verify
    - frontend:test
  script:
    - pnpm build
