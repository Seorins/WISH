map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    listen [::]:80;
    server_name
        jenkins.wish-e103.xyz
        game-dev.wish-e103.xyz
        admin-dev.wish-e103.xyz
        guardian-dev.wish-e103.xyz
        api-dev.wish-e103.xyz;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name jenkins.wish-e103.xyz;

    ssl_certificate /etc/letsencrypt/live/wish-e103.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wish-e103.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    location / {
        set $upstream_jenkins jenkins;
        proxy_pass http://$upstream_jenkins:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

