server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api-dev.wish-e103.xyz;

    ssl_certificate /etc/letsencrypt/live/wish-e103.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wish-e103.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    location = /api/v1 {
        return 301 /api/v1/;
    }

    location = /api/v1/actuator/prometheus {
        return 403;
    }

    location = /api/v1/realtime/events {
        set $upstream_backend backend-dev;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 35m;
        proxy_send_timeout 35m;
        proxy_next_upstream off;
        access_log /var/log/nginx/sse_access.log sse_timing;

        add_header X-Accel-Buffering no;

        # No X-Forwarded-Prefix: this subdomain exposes the same /api/v1 prefix as upstream.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    location /api/v1/ {
        set $upstream_backend backend-dev;
        proxy_pass http://$upstream_backend:8080;
        proxy_http_version 1.1;

        # 마을 광장 STOMP WebSocket (S14P31E103-762) — /api/v1/ws/village 가 이 location 으로
        # 매칭되므로 업스트림에 Upgrade 헤더가 전달돼야 핸드셰이크가 성립. REST 호출은
        # $http_upgrade 가 빈 문자열이라 영향 없음.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name k14e103.p.ssafy.io;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name k14e103.p.ssafy.io;

    ssl_certificate /etc/letsencrypt/live/p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p.ssafy.io/privkey.pem;

    client_max_body_size 50m;

    location = /jenkins {
        return 301 /jenkins/;
    }

    location /jenkins/ {
        proxy_pass http://jenkins:8080;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /jenkins;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    location = /dev/api/v1 {
        return 301 /dev/api/v1/;
    }

    location = /dev/api/v1/actuator/prometheus {
        return 403;
    }

    location = /dev/api/v1/realtime/events {
        proxy_pass http://backend-dev:8080/api/v1/realtime/events;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 35m;
        proxy_send_timeout 35m;
        proxy_next_upstream off;
        access_log /var/log/nginx/sse_access.log sse_timing;

        add_header X-Accel-Buffering no;

        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        # Required only for k14 path because public prefix differs from upstream /api/v1.
        proxy_set_header X-Forwarded-Prefix /dev/api/v1;
    }

    location /dev/api/v1/ {
        proxy_pass http://backend-dev:8080/api/v1/;
        proxy_http_version 1.1;

        # 마을 광장 STOMP WebSocket (S14P31E103-762) — api-dev 와 동일 패치.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /dev/api/v1;
    }

    # AI dev is exposed through ai-dev.wish-e103.xyz. Keep the legacy k14e103
    # path disabled so subdomain routing stays the single dev entrypoint.
    # location = /dev/ai/api/v1 {
    #     return 301 /dev/ai/api/v1/;
    # }
    #
    # location /dev/ai/api/v1/ {
    #     proxy_pass http://ai-dev:8001/api/v1/;
    #     proxy_http_version 1.1;
    #
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_set_header X-Forwarded-Host $host;
    #     proxy_set_header X-Forwarded-Port $server_port;
    #     proxy_set_header X-Forwarded-Prefix /dev/ai/api/v1;
    # }

    location = /dev/game {
        auth_basic "WISH Frontend Dev";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-dev-front;
        return 301 /dev/game/;
    }

    location /dev/game/ {
        auth_basic "WISH Frontend Dev";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-dev-front;

        proxy_pass http://frontend-game-dev:80/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /dev/game;
    }

    location = /dev/admin {
        auth_basic "WISH Frontend Dev";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-dev-front;
        return 301 /dev/admin/;
    }

    location /dev/admin/ {
        auth_basic "WISH Frontend Dev";
        auth_basic_user_file /etc/nginx/conf.d/.htpasswd-dev-front;

        proxy_pass http://frontend-admin-dev:80/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Prefix /dev/admin;
    }

    location = /n8n {
        return 301 /n8n/;
    }

    location /n8n/ {
        proxy_pass http://n8n:5678/;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
