global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: platform
    host: single-ec2

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
        labels:
          service: prometheus

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: node-exporter

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080
        labels:
          service: cadvisor

  - job_name: docker-stats
    static_configs:
      - targets:
          - docker-stats-exporter:9487
        labels:
          service: docker-stats

  - job_name: backend-dev
    metrics_path: /api/v1/actuator/prometheus
    static_configs:
      - targets:
          - backend-dev:8080
        labels:
          service: backend
          env: dev

  - job_name: postgres-dev
    static_configs:
      - targets:
          - postgres-exporter:9187
        labels:
          service: postgres
          env: dev

  - job_name: redis-dev
    static_configs:
      - targets:
          - redis-exporter:9121
        labels:
          service: redis
          env: dev
